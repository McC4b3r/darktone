name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build NSIS installer
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles nsis

      - name: Run packaged playback smoke test
        shell: pwsh
        run: |
          $env:DARKTONE_PLAYBACK_SMOKE = "1"
          $env:DARKTONE_PLAYBACK_SMOKE_REPORT = Join-Path $env:GITHUB_WORKSPACE "playback-smoke-report.json"
          $env:DARKTONE_PLAYBACK_TRANSPORT = "legacy"

          if (Test-Path $env:DARKTONE_PLAYBACK_SMOKE_REPORT) {
            Remove-Item $env:DARKTONE_PLAYBACK_SMOKE_REPORT -Force
          }

          $exePath = Join-Path $env:GITHUB_WORKSPACE "src-tauri\target\release\darktone-player.exe"
          if (-not (Test-Path $exePath)) {
            throw "Could not find the packaged release executable at $exePath"
          }

          $process = Start-Process -FilePath $exePath -Wait -PassThru -NoNewWindow
          $smokeFailure = $null

          if (-not (Test-Path $env:DARKTONE_PLAYBACK_SMOKE_REPORT)) {
            $smokeFailure = "Playback smoke report was not created."
          } else {
            Write-Host "Playback smoke report:"
            Get-Content $env:DARKTONE_PLAYBACK_SMOKE_REPORT -Raw | Write-Host

            $report = Get-Content $env:DARKTONE_PLAYBACK_SMOKE_REPORT -Raw | ConvertFrom-Json
            if (-not $report.passed) {
              $failureSummary = if ($report.failures) { ($report.failures -join "; ") } else { "Unknown smoke failure." }
              $warningSummary = if ($report.warnings) { ($report.warnings -join "; ") } else { "" }
              $smokeFailure = "Playback smoke report marked the run as failed. Failures: $failureSummary Warnings: $warningSummary"
            }
          }

          if ($process.ExitCode -ne 0 -and -not $smokeFailure) {
            $smokeFailure = "Playback smoke executable exited with code $($process.ExitCode)"
          }

          if ($smokeFailure) {
            throw $smokeFailure
          }

      - name: Upload playback smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-playback-smoke-report
          path: playback-smoke-report.json
          if-no-files-found: warn

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
